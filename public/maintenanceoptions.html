    <div class="pageintro">
        <section>
                <h1 class="intro-heading">Maintenance Options</h1>

            <!-- MAINTENANCE OPTIONS -->
            <div class="maintenance-options-buttons-container">
                <div class="row">
                    <div><button class="fluids-button maintenance-options-button">Fluids</button></div>
                    <div><button class="filters-button maintenance-options-button">Filters</button></div>
                </div>
                <div class="row">
                    <div><button class="tires-button maintenance-options-button" >Tires</button></div>
                    <div><button class="lights-button maintenance-options-button">Lights</button></div>
                </div>
                <div class="row">
                    <div><button class="cleaning-button maintenance-options-button">Cleaning</button></div>
                    <div><button class="oil-button maintenance-options-button">Oil</button></div>
                </div>
            </div>

            <!-- SUB-MAINTENANCE OPTIONS -->
            <div class="sub-maintenance-options-buttons-container" hidden>
                <div class="sub-maintenance-fluids" hidden>
                    <h2 class="maintenanceType">Fluids</h2>
                    <div><button class="fluid-details-button sub-maintenance-options-button">Windshield Washer Fluid</button></div>
                    <div><button class="fluid-details-button sub-maintenance-options-button">Automatic Transmission Fluid</button></div>
                    <div><button class="fluid-details-button sub-maintenance-options-button">Power Steering Fluid</button></div>
                    <div><button class="fluid-details-button sub-maintenance-options-button">Chassis Lubrication</button></div>
                </div>
    
                <div class="sub-maintenance-filters" hidden>
                    <h2>Filters</h2>
                    <div><button class="filters-details-button sub-maintenance-options-button">Fuel Filter</button></div>
                    <div><button class="filters-details-button sub-maintenance-options-button">Engine Filter</button></div>
                    <div><button class="filters-details-button sub-maintenance-options-button">Cabin Filter</button></div>
                </div>
    
                <div class="sub-maintenance-tires" hidden>
                    <h2>Tires</h2>
                    <div><button class="tire-details-button sub-maintenance-options-button">Inflation</button></div>
                    <div><button class="tire-details-button sub-maintenance-options-button">Tread</button></div>
                    <div><button class="tire-details-button sub-maintenance-options-button">General Condition</button></div>
                </div>
    
                <div class="sub-maintenance-lights" hidden>
                    <h2>Lights</h2>
                    <div><button class="lights-details-button sub-maintenance-options-button">Check Lights</button></div>
                    <div><button class="lights-details-button sub-maintenance-options-button">Replace Bulb</button></div>
                </div>
    
                <div class="sub-maintenance-cleaning" hidden>
                    <h2>Cleaning</h2>
                    <div><button class="cleaning-details-button sub-maintenance-options-button">Interior</button></div>
                    <div><button class="cleaning-details-button sub-maintenance-options-button">Exterior</button></div>
                </div>
    
                <div class="sub-maintenance-oil" hidden>
                    <h2>Oil</h2>
                    <div><button class="oil-details-button sub-maintenance-options-button">Check Oil</button></div>
                    <div><button class="oil-details-button sub-maintenance-options-button">Oil Change</button></div>
                </div>

                <div class="go-back"><p class="go-back"><i class="fas fa-arrow-left go-back" style="display: none;"></i> GO BACK</p></div>
                
            </div>
            <!-- <button type="button" class="trip-button">New Trip</button> -->
        </section>

    </div>


    <section class="logo"> 
        <img alt="Traveling Icon" src="http://chittagongit.com/images/traveling-icon/traveling-icon-18.jpg" alt="">
    </section>
